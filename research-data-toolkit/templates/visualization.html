{% extends "base.html" %}
{% block content %}
<div class="row mb-4">
  <div class="col-12">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h3>Visualize: {{ record.name }}</h3>
            <p class="text-muted">Interactive charts generated for your cleaned dataset.</p>
          </div>
          <a class="btn btn-outline-secondary" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
        </div>
        <div class="row mt-3">
          <div class="col-12">
            {% if plot_html %}
            <div class="card p-3 mb-3">{{ plot_html|safe }}</div>
            {% else %}
            <div class="alert alert-info">No plots available for this dataset.</div>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
