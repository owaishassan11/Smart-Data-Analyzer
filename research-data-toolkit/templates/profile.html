{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h3 class="card-title mb-3">Profile</h3>
        <p class="text-muted">Your account details and project progress.</p>
        <ul class="list-group list-group-flush">
          <li class="list-group-item"><strong>Username:</strong> {{ user.username }}</li>
          <li class="list-group-item"><strong>Email:</strong> {{ user.email }}</li>
          <li class="list-group-item"><strong>Joined:</strong> {{ user.created_at.strftime('%Y-%m-%d') }}</li>
        </ul>
        <div class="mt-4">
          <a class="btn btn-secondary" href="{{ url_for('dashboard') }}">Back to dashboard</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
