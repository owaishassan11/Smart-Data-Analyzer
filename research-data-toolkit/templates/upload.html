{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-7 col-lg-8">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h3 class="card-title mb-3">Upload Dataset</h3>
        <p class="text-muted">Upload experimental CSV or Excel files and start the automated workflow.</p>
        <form method="post" enctype="multipart/form-data" action="{{ url_for('upload') }}">
          <div class="mb-3">
            <label class="form-label">Dataset Name</label>
            <input type="text" name="dataset_name" class="form-control" placeholder="Lab experiment dataset" />
          </div>
          <div class="mb-3">
            <label class="form-label">File</label>
            <input type="file" name="dataset_file" class="form-control" required />
          </div>
          <button class="btn btn-primary" type="submit">Upload and Process</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
